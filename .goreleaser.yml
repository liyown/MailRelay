version: 2

project_name: mailrelay

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mailrelay
    main: ./cmd/mailrelay
    binary: mailrelay
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/becomeopc/opc-mailrelay/internal/version.Version={{.Version}}
      - -X github.com/becomeopc/opc-mailrelay/internal/version.Commit={{.Commit}}
      - -X github.com/becomeopc/opc-mailrelay/internal/version.BuildTime={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  prerelease: auto
